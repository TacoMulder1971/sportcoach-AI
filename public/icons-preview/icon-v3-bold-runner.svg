<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- v3: Bold sportieve hartslag-curve met driehoek-accent -->
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="45" fill="url(#bg3)"/>

  <!-- Bold hartslag-curve (sportieve referentie + AI feel) -->
  <path d="M 22 105
           L 60 105
           L 72 80
           L 88 130
           L 102 60
           L 116 130
           L 130 90
           L 142 105
           L 178 105"
        stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Drie kleine sportdots bovenaan (tri-referentie) -->
  <circle cx="68" cy="42" r="7" fill="white"/>
  <circle cx="100" cy="42" r="7" fill="white"/>
  <circle cx="132" cy="42" r="7" fill="white"/>

  <!-- Onderaan: drie strepen voor "snelheid" -->
  <path d="M 50 165 L 80 165" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M 88 165 L 118 165" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M 126 165 L 150 165" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
</svg>
