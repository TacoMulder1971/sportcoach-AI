        <path d="M12 7.5 L 15 9.5 L 14 13 L 10 13 L 9 9.5 Z" stroke-width="1.6"/>
        <path d="M12 7.5 L 12 4.5 M 15 9.5 L 18 8 M 14 13 L 16.5 15.5 M 10 13 L 7.5 15.5 M 9 9.5 L 6 8" stroke-width="1.4"/>
      </g>
      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569" font-weight="600">Voetballen ✨</text>
    </g>
