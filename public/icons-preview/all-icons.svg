        <circle cx="18" cy="19" r="2.5" stroke-width="2"/>
        <path d="M 6 19 Q 12 10 18 19"/>
        <path d="M 11 14 L 11 6"/>
        <path d="M 9 6 L 13 6"/>
        <path d="M 17 14 L 17 7"/>
        <path d="M 14 7 L 19 7"/>
        <path d="M 14 4.5 L 14 7 L 18 7 L 18 4.5" stroke-width="1.6"/>
      </g>
      <text x="52" y="22" font-family="-apple-system" font-size="13" font-weight="600" fill="#1f2937">Stadje rondje</text>
      <text x="52" y="38" font-family="-apple-system" font-size="11" fill="#64748b">15min · 4.2km · telt niet mee</text>
    </g>

    <!-- Row 4: Wandelen -->
    <g transform="translate(360, 60)">
      <rect width="40" height="40" rx="10" fill="#111827"/>
      <g transform="translate(8,8) scale(1)" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-teal)">
        <circle cx="13" cy="4" r="2"/>
        <path d="M13 7v5l-3 3.5L12 21"/>
        <path d="M12 13.5l4 1.5"/>
        <path d="M10 8l-3 2 2 3"/>
        <path d="M8 21l1.5-4"/>
      </g>
      <text x="52" y="22" font-family="-apple-system" font-size="13" font-weight="600" fill="#1f2937">Avondwandeling</text>
      <text x="52" y="38" font-family="-apple-system" font-size="11" fill="#64748b">50min · 4.1km</text>
    </g>

    <!-- Row 5: Voetballen -->
    <g transform="translate(16, 105)">
      <rect width="40" height="40" rx="10" fill="#111827"/>
      <g transform="translate(8,8) scale(1)" fill="none" stroke="#eab308" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-yellow)">
        <circle cx="12" cy="11" r="7"/>
