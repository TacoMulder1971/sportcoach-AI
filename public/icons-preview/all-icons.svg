<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" width="720" height="600">
  <defs>
    <filter id="g-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-emerald" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-gray" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- light background -->
  <rect width="720" height="600" fill="#f1f5f9"/>

  <!-- Title -->
  <text x="20" y="35" font-family="-apple-system, system-ui" font-size="20" font-weight="700" fill="#0f172a">Sport-iconen (in Activiteiten-lijst)</text>

  <!-- ROW 1 Sport icons -->
  <g transform="translate(20, 60)">
    <!-- Zwemmen -->
    <g transform="translate(0,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-blue)">
        <circle cx="6" cy="7" r="2.5"/>
        <path d="M3 17c1-2 3-4 5.5-4s3 1.5 5 1.5 3.5-1.5 5.5-1.5c1.5 0 2.5.5 3 1"/>
        <path d="M8.5 12l3 2.5-1.5 3"/>
      </g>
      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569">Zwemmen</text>
    </g>
    <!-- Hardlopen -->
    <g transform="translate(100,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-orange)">
        <circle cx="13" cy="4" r="2.5"/>
        <path d="M10 10l-3 10"/>
        <path d="M13.5 7L11 12l4 2-1.5 6"/>
        <path d="M17 7l-3.5 0"/>
        <path d="M7 20l3-10"/>
      </g>
      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569">Hardlopen</text>
    </g>
    <!-- Fietsen (race) -->
    <g transform="translate(200,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-green)">
        <circle cx="17.5" cy="5" r="2.2"/>
        <circle cx="6" cy="18" r="3" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" stroke-width="2"/>
        <path d="M18 18l-3.5-7-3 3.5-2-2.5L6 18"/>
        <path d="M14.5 11l2-4.5"/>
      </g>
      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569">Fietsen</text>
    </g>
