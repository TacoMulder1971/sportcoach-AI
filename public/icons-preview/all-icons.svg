        <circle cx="17.5" cy="5" r="2.2"/>
        <circle cx="6" cy="18" r="3" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" stroke-width="2"/>
        <path d="M18 18l-3.5-7-3 3.5-2-2.5L6 18"/>
        <path d="M14.5 11l2-4.5"/>
        <path d="M2 14l4-4 4 2 4-5 4 1"/>
      </g>
      <text x="52" y="22" font-family="-apple-system" font-size="13" font-weight="600" fill="#1f2937">Bos MTB-rit</text>
      <text x="52" y="38" font-family="-apple-system" font-size="11" fill="#64748b">45min · 14.2km · HR 142/158</text>
    </g>

    <!-- Row 3: Stadsfiets -->
    <g transform="translate(360, 14)">
      <rect width="40" height="40" rx="10" fill="#111827"/>
      <g transform="translate(8,8) scale(1)" fill="none" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-gray)">
