    <g transform="translate(500,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#eab308" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-yellow)">
