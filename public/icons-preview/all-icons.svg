  <!-- Mockup: hoe ziet de Activiteiten-lijst eruit -->
  <text x="20" y="420" font-family="-apple-system, system-ui" font-size="20" font-weight="700" fill="#0f172a">In de Activiteiten-lijst:</text>

  <g transform="translate(20, 440)">
    <rect width="680" height="140" rx="12" fill="white" stroke="#e2e8f0"/>

    <!-- Row 1: BMC racefiets -->
    <g transform="translate(16, 14)">
      <rect width="40" height="40" rx="10" fill="#111827"/>
      <g transform="translate(8,8) scale(1) translate(0,0)" fill="none" stroke="#22c55e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-green)">
        <circle cx="17.5" cy="5" r="2.2"/>
        <circle cx="6" cy="18" r="3" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" stroke-width="2"/>
        <path d="M18 18l-3.5-7-3 3.5-2-2.5L6 18"/>
        <path d="M14.5 11l2-4.5"/>
      </g>
      <text x="52" y="22" font-family="-apple-system" font-size="13" font-weight="600" fill="#1f2937">Albrandswaard Wegwielren</text>
      <text x="52" y="38" font-family="-apple-system" font-size="11" fill="#64748b">62min · 32.87km · HR 125/137 · 161W</text>
    </g>

    <!-- Row 2: MTB -->
