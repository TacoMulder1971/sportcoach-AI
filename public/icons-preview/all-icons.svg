    <g transform="translate(300,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#10b981" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-emerald)">
        <circle cx="17.5" cy="5" r="2.2"/>
        <circle cx="6" cy="18" r="3" stroke-width="2"/>
        <circle cx="18" cy="18" r="3" stroke-width="2"/>
        <path d="M18 18l-3.5-7-3 3.5-2-2.5L6 18"/>
