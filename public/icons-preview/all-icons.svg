      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569">Mountainbike</text>
    </g>
    <!-- Wandelen NIEUW -->
    <g transform="translate(400,0)">
      <rect width="80" height="80" rx="16" fill="#111827"/>
      <g transform="translate(16,16) scale(2)" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-teal)">
        <circle cx="13" cy="4" r="2"/>
        <path d="M13 7v5l-3 3.5L12 21"/>
        <path d="M12 13.5l4 1.5"/>
        <path d="M10 8l-3 2 2 3"/>
        <path d="M8 21l1.5-4"/>
      </g>
      <text x="40" y="100" text-anchor="middle" font-family="-apple-system" font-size="12" fill="#475569" font-weight="600">Wandelen ✨</text>
    </g>
