      </g>
      <text x="52" y="22" font-family="-apple-system" font-size="13" font-weight="600" fill="#1f2937">Voetbaltraining</text>
      <text x="52" y="38" font-family="-apple-system" font-size="11" fill="#64748b">90min · HR 138/176</text>
    </g>

    <!-- Row 6: Hardlopen (Brooks toegewezen) -->
    <g transform="translate(360, 105)">
      <rect width="40" height="40" rx="10" fill="#111827"/>
      <g transform="translate(8,8) scale(1)" fill="none" stroke="#f97316" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#g-orange)">
        <path d="M2 16 C 2 13.5 4 12.5 6.5 12.5 L 13 12.5 C 17 12.5 20.5 14 21.5 16.5 L 22 18 L 2 18 Z"/>
